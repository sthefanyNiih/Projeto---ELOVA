spring.application.name=api

# ================================
# CONEXÃO COM MYSQL
# ================================
spring.datasource.url=jdbc:mysql://localhost:3306/elova?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=SEU_USUARIO
spring.datasource.password=SUA_SENHA
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================
# JPA / HIBERNATE
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ================================
# JWT
# ================================
elova.jwt.secret=SUA_CHAVE_JWT
elova.jwt.expiration=86400000
elova.jwt.reset-expiration=1800000

# ================================
# E-MAIL (Gmail)
# ================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=SEU_EMAIL@gmail.com
spring.mail.password=SUA_SENHA_DE_APLICATIVO
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ================================
# SERVIDOR
# ================================
server.port=8080

# ================================
# WIKIPEDIA
# ================================
elova.api.wikipedia.url=https://pt.wikipedia.org/api/rest_v1

# ================================
# YOUTUBE
# ================================
elova.api.youtube.key=SUA_YOUTUBE_API_KEY

# ================================
# OPEN LIBRARY
# ================================
elova.api.openlibrary.url=https://openlibrary.org