<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Conta - Elova</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f7ff;
}

.dashboard{
    display:flex;
    min-height:100vh;
}

.sidebar{
    width:250px;
    background:linear-gradient(180deg,#6d5dfc,#4b7bec);
    color:white;
    padding:30px;
}

.logo{
    font-size:32px;
    font-weight:900;
    text-align:center;
    margin-bottom:40px;
    letter-spacing:4px;
    text-transform:uppercase;
    color:white;
    text-shadow:2px 2px 10px rgba(255,255,255,0.3);
}

.sidebar ul{
    list-style:none;
}

.sidebar li{
    margin:20px 0;
    cursor:pointer;
    padding:12px;
    border-radius:10px;
    transition:0.3s;
}

.sidebar li:hover{
    background:rgba(255,255,255,0.2);
}

.sidebar li i{
    margin-right:10px;
}

main{
    flex:1;
    padding:30px;
}

.perfil{
    background:white;
    border-radius:20px;
    padding:20px;
    display:flex;
    align-items:center;
    gap:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.05);
}

.perfil img{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
}

.perfil h2{
    color:#6d5dfc;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:25px;
}

.card{
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.05);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.barra{
    background:#ddd;
    height:15px;
    border-radius:10px;
    margin:15px 0;
}

.preenchimento{
    width:65%;
    height:100%;
    background:linear-gradient(90deg,#6d5dfc,#4b7bec);
    border-radius:10px;
}

.topicos{
    margin-top:30px;
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.05);
}

.topicos h2{
    margin-bottom:15px;
}

.topico{
    display:flex;
    justify-content:space-between;
    padding:15px;
    margin-top:10px;
    border-radius:10px;
    background:#f7f8ff;
}

</style>
</head>

<body>

<div class="dashboard">

    <aside class="sidebar">

        <h2 class="logo">Elova</h2>

        <ul>
            <li onclick="abrirPagina('inicio.html')">
                <i class="fa-solid fa-house"></i> Início
            </li>

            <li onclick="abrirPagina('cursos.html')">
                <i class="fa-solid fa-book-open"></i> Cursos
            </li>

            <li onclick="abrirPagina('progresso.html')">
                <i class="fa-solid fa-chart-line"></i> Progresso
            </li>

            <li onclick="abrirPagina('metas.html')">
                <i class="fa-solid fa-bullseye"></i> Metas
            </li>

            <li onclick="abrirPagina('configuracoes.html')">
                <i class="fa-solid fa-gear"></i> Configurações
            </li>
        </ul>

    </aside>

    <main>

        <div class="perfil">

            <img src="https://via.placeholder.com/100">

            <div>
                <h2>Anna Clara</h2>
                <p>Nível 1 - Programação</p>
            </div>

        </div>

        <div class="cards">

            <div class="card">
                <h3>Progresso Geral</h3>

                <div class="barra">
                    <div class="preenchimento"></div>
                </div>

                <p>65% concluído</p>
            </div>

            <div class="card">
                <h3>Horas Estudadas</h3>
                <h1>48h</h1>
            </div>

            <div class="card">
                <h3>Sequência</h3>
                <h1>12 dias 🔥</h1>
            </div>

        </div>

        <div class="topicos">

            <h2>Tópicos de Programação</h2>

            <div class="topico">
                <span>HTML - Nível 1</span>
                <span>100%</span>
            </div>

            <div class="topico">
                <span>CSS - Nível 1</span>
                <span>80%</span>
            </div>

            <div class="topico">
                <span>JavaScript - Nível 1</span>
                <span>45%</span>
            </div>

            <div class="topico">
                <span>Banco de Dados - Nível 1</span>
                <span>20%</span>
            </div>

        </div>

    </main>

</div>

<script>

function abrirPagina(pagina){
    window.location.href = pagina;
}

</script>

</body>
</html>
